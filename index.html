// ---------- storage ----------
const KEY = "spira:sessions";

async function loadSessions() {
  try {
    return JSON.parse(localStorage.getItem(KEY)) || [];
  } catch {
    return [];
  }
}

async function saveSessions(sessions) {
  try {
    localStorage.setItem(KEY, JSON.stringify(sessions));
  } catch (e) {
    console.error("save failed", e);
  }
}

function dayKey(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(
    d.getDate()
  ).padStart(2, "0")}`;
}

function calcStreak(sessions) {
  if (!sessions.length) return 0;
  const days = new Set(sessions.map((s) => dayKey(s.ts)));
  let streak = 0;
  const cursor = new Date();
  // streak may start today or yesterday
  if (!days.has(dayKey(cursor.getTime()))) cursor.setDate(cursor.getDate() - 1);
  while (days.has(dayKey(cursor.getTime()))) {
    streak++;
    cursor.setDate(cursor.getDate() - 1);
  }
  return streak;
}

function fmtDuration(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  if (m === 0) return `${s}s`;
  return s ? `${m}m ${s}s` : `${m}m`;
}

// ---------- pacer ----------
function Pacer({ tech, onFinish, onBack }) {
  const goal = GOALS[tech.goals[0]];
  const p = tech.pattern;
  const [elapsed, setElapsed] = useState(0); // total session seconds (0.1 steps)
  const [phaseIdx, setPhaseIdx] = useState(0);
  const [phaseElapsed, setPhaseElapsed] = useState(0);
  const [cycles, setCycles] = useState(0);
  const [round, setRound] = useState(1);
  const [inBurst, setInBurst] = useState(true);
  const raf = useRef(null);
  const startRef = useRef(Date.now());
  const stateRef = useRef({ phaseIdx: 0, phaseStart: Date.now(), round: 1, inBurst: true, cycles: 0 });

  useEffect(() => {
    startRef.current = Date.now();
    stateRef.current = { phaseIdx: 0, phaseStart: Date.now(), round: 1, inBurst: true, cycles: 0 };
    const tick = () => {
      const now = Date.now();
      setElapsed((now - startRef.current) / 1000);
      const st = stateRef.current;

      if (p.type === "rapid") {
        const segLen = st.inBurst ? p.burstSeconds : p.restSeconds;
        const segElapsed = (now - st.phaseStart) / 1000;
        if (segElapsed >= segLen) {
          if (st.inBurst) {
            if (st.round >= p.rounds) {
              finish(now);
              return;
            }
            st.inBurst = false;
          } else {
            st.inBurst = true;
            st.round += 1;
          }
          st.phaseStart = now;
          setInBurst(st.inBurst);
          setRound(st.round);
        }
        setPhaseElapsed((now - st.phaseStart) / 1000);
      } else if (p.type === "open") {
        setPhaseElapsed((now - startRef.current) / 1000);
      } else {
        const phase = p.phases[st.phaseIdx];
        const segElapsed = (now - st.phaseStart) / 1000;
        if (segElapsed >= phase.seconds) {
          st.phaseIdx = (st.phaseIdx + 1) % p.phases.length;
          if (st.phaseIdx === 0) {
            st.cycles += 1;
            setCycles(st.cycles);
          }
          st.phaseStart = now;
          setPhaseIdx(st.phaseIdx);
        }
        setPhaseElapsed((now - st.phaseStart) / 1000);
      }
      raf.current = requestAnimationFrame(tick);
    };
    raf.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf.current);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const finish = (now) => {
    cancelAnimationFrame(raf.current);
    const dur = Math.round(((now || Date.now()) - startRef.current) / 1000);
    onFinish(dur);
  };

  // orb visuals
  let orbScale = 1;
  let phaseLabel = "";
  let countLeft = "";
  let transition = "transform 0.3s ease";

  if (p.type === "rapid") {
    if (inBurst) {
      phaseLabel = "Pump the breath";
      countLeft = `${Math.ceil(tech.pattern.burstSeconds - phaseElapsed)}`;
      orbScale = null; // CSS pulse animation
    } else {
      phaseLabel = "Rest · breathe slow";
      countLeft = `${Math.ceil(tech.pattern.restSeconds - phaseElapsed)}`;
      const t = (phaseElapsed % 8) / 8;
      orbScale = t < 0.5 ? 0.6 + 0.4 * (t / 0.5) : 1 - 0.4 * ((t - 0.5) / 0.5);
      transition = "none";
    }
  } else if (p.type === "open") {
    phaseLabel = p.openLabel;
    countLeft = "";
    const t = (phaseElapsed % 10) / 10;
    orbScale = 0.72 + 0.14 * Math.sin(t * Math.PI * 2);
    transition = "none";
  } else {
    const phase = p.phases[phaseIdx];
    phaseLabel = phase.label;
    countLeft = `${Math.ceil(phase.seconds - phaseElapsed)}`;
    orbScale = phase.scale;
    transition = `transform ${phase.seconds}s ease-in-out`;
  }

  return (
    <div
      style={{
        minHeight: "100vh",
        background: goal.soft,
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        padding: "24px 20px 40px",
        transition: "background 0.6s ease",
      }}
    >
      <style>{`
        @keyframes firePulse {
          0% { transform: scale(0.7); }
          50% { transform: scale(1); }
          100% { transform: scale(0.7); }
        }
        @media (prefers-reduced-motion: reduce) {
          .orb { transition: none !important; animation: none !important; transform: scale(0.85) !important; }
        }
      `}</style>

      <div style={{ width: "100%", maxWidth: 420, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <button
          onClick={onBack}
          style={{ ...sans, background: "none", border: "none", color: goal.color, fontSize: 15, fontWeight: 600, cursor: "pointer", padding: 8 }}
        >
          ← Back
        </button>
        <span style={{ ...sans, fontSize: 14, color: C.faint }}>{fmtDuration(Math.floor(elapsed))}</span>
      </div>

      <h2 style={{ ...serif, color: C.ink, fontSize: 26, margin: "18px 0 4px", textAlign: "center" }}>
        {tech.emoji} {tech.name}
      </h2>
      <p style={{ ...sans, color: C.faint, fontSize: 14, margin: 0 }}>{p.note}</p>

      <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", width: "100%" }}>
        <div style={{ height: 240, width: 240, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div
            className="orb"
            style={{
              width: 200,
              height: 200,
              borderRadius: "50%",
              background: `radial-gradient(circle at 35% 30%, ${goal.color}CC, ${goal.color})`,
              boxShadow: `0 12px 48px ${goal.color}55`,
              transform: orbScale === null ? undefined : `scale(${orbScale})`,
              transition,
              animation: orbScale === null ? "firePulse 0.66s ease-in-out infinite" : "none",
            }}
          />
        </div>
        <div style={{ ...serif, fontSize: 24, color: C.ink, marginTop: 28, textAlign: "center" }}>{phaseLabel}</div>
        <div style={{ ...sans, fontSize: 40, color: goal.color, fontWeight: 300, marginTop: 4, fontVariantNumeric: "tabular-nums" }}>
          {countLeft}
        </div>
        <div style={{ ...sans, fontSize: 14, color: C.faint, marginTop: 10 }}>
          {p.type === "rapid"
            ? `Round ${round} of ${p.rounds}`
            : p.type === "open"
            ? "No counting — just noticing"
            : p.countTo
            ? `Count ${(cycles % p.countTo) + 1} of ${p.countTo}`
            : `Cycle ${cycles + 1}${p.suggestedCycles ? ` · ${p.suggestedCycles} is plenty` : ""}`}
        </div>
      </div>

      <button
        onClick={() => finish()}
        style={{
          ...sans,
          background: goal.color,
          color: "#fff",
          border: "none",
          borderRadius: 999,
          padding: "14px 36px",
          fontSize: 16,
          fontWeight: 600,
          cursor: "pointer",
          boxShadow: `0 4px 16px ${goal.color}44`,
        }}
      >
        End session
      </button>
    </div>
  );
}

// ---------- log ----------
function Log({ sessions }) {
  const streak = calcStreak(sessions);
  const totalMin = Math.round(sessions.reduce((a, s) => a + s.duration, 0) / 60);
  const recent = [...sessions].sort((a, b) => b.ts - a.ts).slice(0, 30);

  const byDay = {};
  recent.forEach((s) => {
    const k = dayKey(s.ts);
    (byDay[k] = byDay[k] || []).push(s);
  });

  return (
    <div style={{ maxWidth: 560, margin: "0 auto" }}>
      <div style={{ display: "flex", gap: 12, marginTop: 8 }}>
        <StatCard big={`${streak}`} label={streak === 1 ? "day streak 🔥" : "day streak 🔥"} />
        <StatCard big={`${sessions.length}`} label="sessions" />
        <StatCard big={`${totalMin}`} label="minutes" />
      </div>

      {recent.length === 0 ? (
        <div style={{ ...sans, textAlign: "center", color: C.faint, fontSize: 15, marginTop: 56, lineHeight: 1.6 }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>🍃</div>
          No sessions yet. Pick a technique and your practice will show up here.
        </div>
      ) : (
        Object.entries(byDay).map(([day, list]) => (
          <div key={day} style={{ marginTop: 24 }}>
            <div style={{ ...sans, fontSize: 13, fontWeight: 700, color: C.faint, textTransform: "uppercase", letterSpacing: 0.6, marginBottom: 8 }}>
              {new Date(list[0].ts).toLocaleDateString(undefined, { weekday: "long", month: "short", day: "numeric" })}
            </div>
            {list.map((s, i) => {
              const t = TECHNIQUES.find((t) => t.id === s.techId);
              return (
                <div
                  key={i}
                  style={{
                    background: C.card,
                    border: `1px solid ${C.line}`,
                    borderRadius: 16,
                    padding: "12px 16px",
                    marginBottom: 8,
                    display: "flex",
                    justifyContent: "space-between",
                    alignItems: "center",
                  }}
                >
                  <span style={{ ...sans, fontSize: 15, color: C.ink }}>
                    {t ? `${t.emoji} ${t.name}` : s.techId}
                  </span>
                  <span style={{ ...sans, fontSize: 14, color: C.faint }}>{fmtDuration(s.duration)}</span>
                </div>
              );
            })}
          </div>
        ))
      )}
    </div>
  );
}

                  padding: "18px 18px",
                  marginBottom: 12,
                  cursor: "pointer",
                }}
              >
                <div style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
                  <div style={{ fontSize: 32, lineHeight: 1 }}>{t.emoji}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ ...serif, fontSize: 20, color: C.ink }}>{t.name}</div>
                    <div style={{ ...sans, fontSize: 14, color: C.faint, margin: "3px 0 4px", lineHeight: 1.5 }}>
                      {t.tagline}
                    </div>
                    <div style={{ ...sans, fontSize: 12, color: C.faint, fontStyle: "italic", margin: "0 0 8px" }}>
                      {t.roots}
                    </div>
                    <GoalChips goals={t.goals} size={12} />
                  </div>
                </div>
              </button>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

// ---------- done screen ----------
function Done({ tech, duration, streak, onHome }) {
  const goal = GOALS[tech.goals[0]];
  return (
    <div style={{ minHeight: "100vh", background: C.paper, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, textAlign: "center" }}>
      <div style={{ fontSize: 56 }}>{tech.emoji}</div>
      <h2 style={{ ...serif, fontSize: 28, color: C.ink, margin: "14px 0 6px" }}>Session saved</h2>
      <p style={{ ...sans, color: C.faint, fontSize: 15, margin: 0 }}>
        {tech.name} · {fmtDuration(duration)}
      </p>
      {streak > 0 && (
        <p style={{ ...sans, color: C.fire, fontSize: 15, fontWeight: 700, marginTop: 12 }}>
          🔥 {streak}-day streak
        </p>
      )}
      <button
        onClick={onHome}
        style={{ ...sans, marginTop: 28, background: goal.color, color: "#fff", border: "none", borderRadius: 999, padding: "14px 36px", fontSize: 16, fontWeight: 600, cursor: "pointer" }}
      >
        Done
      </button>
    </div>
  );
}

// ---------- app ----------
function BreatheApp() {
  const [view, setView] = useState("home");
  const [tab, setTab] = useState("guide");
  const [filter, setFilter] = useState("all");
  const [tech, setTech] = useState(null);
  const [sessions, setSessions] = useState([]);
  const [lastDuration, setLastDuration] = useState(0);

  useEffect(() => {
    loadSessions().then(setSessions);
  }, []);

  const handleFinish = async (duration) => {
    if (duration >= 10) {
      const next = [...sessions, { techId: tech.id, ts: Date.now(), duration }];
      setSessions(next);
      setLastDuration(duration);
      await saveSessions(next);
      setView("done");
    } else {
      setView("detail");
    }
  };

  if (view === "session" && tech)
    return <Pacer tech={tech} onFinish={handleFinish} onBack={() => setView("detail")} />;
  if (view === "detail" && tech)
    return <Detail tech={tech} onStart={() => setView("session")} onBack={() => setView("home")} />;
  if (view === "done" && tech)
    return <Done tech={tech} duration={lastDuration} streak={calcStreak(sessions)} onHome={() => setView("home")} />;

  return (
    <Home
      filter={filter}
      setFilter={setFilter}
      tab={tab}
      setTab={setTab}
      sessions={sessions}
      onPick={(t) => {
        setTech(t);
        setView("detail");
      }}
    />
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<BreatheApp />);

  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }
  </script>
</body>
