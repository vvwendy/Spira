<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="1024" height="1024">
  <defs>
    <clipPath id="squircle">
      <rect x="0" y="0" width="512" height="512" rx="96"/>
    </clipPath>
  </defs>
  <g clip-path="url(#squircle)">
    <!-- night ink sky -->
    <rect width="512" height="512" fill="#161C18"/>

    <!-- stars -->
    <circle cx="64" cy="90" r="3" fill="#F5F5F0" opacity="0.8"/>
    <circle cx="448" cy="110" r="2.5" fill="#F5F5F0" opacity="0.7"/>
    <circle cx="86" cy="440" r="2" fill="#F5F5F0" opacity="0.5"/>
    <circle cx="452" cy="430" r="2" fill="#F5F5F0" opacity="0.55"/>

    <!-- feather crest (inner plumes only; horns take the flanks) -->
    <g>
      <rect x="246" y="40" width="20" height="70" rx="7" fill="#B8402F"/>
      <rect x="246" y="46" width="20" height="64" rx="7" fill="#3E8E71" transform="rotate(22 256 190)"/>
      <rect x="246" y="46" width="20" height="64" rx="7" fill="#3E8E71" transform="rotate(-22 256 190)"/>
      <rect x="246" y="50" width="20" height="60" rx="7" fill="#5FB392" transform="rotate(44 256 190)"/>
      <rect x="246" y="50" width="20" height="60" rx="7" fill="#5FB392" transform="rotate(-44 256 190)"/>
    </g>

    <!-- swept horns -->
    <path d="M 336 124 Q 374 86 394 36 Q 402 80 376 116 Q 360 132 338 134 Z" fill="#BFE0D0"/>
    <path d="M 176 124 Q 138 86 118 36 Q 110 80 136 116 Q 152 132 174 134 Z" fill="#BFE0D0"/>

    <!-- stepped mask plate -->
    <path d="M 256 118 L 344 118 L 344 142 L 368 142 L 368 210 L 352 210 L 352 300 L 312 300 L 312 336 L 200 336 L 200 300 L 160 300 L 160 210 L 144 210 L 144 142 L 168 142 L 168 118 Z"
          fill="#0F1411" stroke="#BFE0D0" stroke-width="8" stroke-linejoin="miter"/>

    <!-- brow band -->
    <rect x="170" y="152" width="172" height="14" fill="#3E8E71"/>

    <!-- angled brow ridges -->
    <path d="M 270 190 L 334 178 L 334 192 L 270 203 Z" fill="#5FB392"/>
    <path d="M 242 190 L 178 178 L 178 192 L 242 203 Z" fill="#5FB392"/>

    <!-- closed rectangular eyes -->
    <rect x="184" y="204" width="56" height="28" rx="3" fill="#BFE0D0"/>
    <rect x="272" y="204" width="56" height="28" rx="3" fill="#BFE0D0"/>
    <path d="M 190 219 L 234 219" stroke="#10140F" stroke-width="6.5" stroke-linecap="round"/>
    <path d="M 278 219 L 322 219" stroke="#10140F" stroke-width="6.5" stroke-linecap="round"/>
    <!-- vermillion tear-steps -->
    <rect x="202" y="238" width="18" height="10" fill="#B8402F"/>
    <rect x="292" y="238" width="18" height="10" fill="#B8402F"/>

    <!-- cheek scale diamonds -->
    <path d="M 180 260 l 9 9 l -9 9 l -9 -9 Z" fill="#3E8E71"/>
    <path d="M 332 260 l 9 9 l -9 9 l -9 -9 Z" fill="#3E8E71"/>

    <!-- long snout bridge -->
    <rect x="240" y="204" width="32" height="58" fill="#3E8E71"/>

    <!-- flared nostril curls -->
    <path d="M 272 252 Q 312 250 314 276 Q 315 296 296 296 Q 284 296 284 284"
          fill="none" stroke="#BFE0D0" stroke-width="10" stroke-linecap="round"/>
    <path d="M 240 252 Q 200 250 198 276 Q 197 296 216 296 Q 228 296 228 284"
          fill="none" stroke="#BFE0D0" stroke-width="10" stroke-linecap="round"/>
    <circle cx="300" cy="276" r="7" fill="#BFE0D0"/>
    <circle cx="212" cy="276" r="7" fill="#BFE0D0"/>

    <!-- breath: long gusts swirling inward at the bottom -->
    <path d="M 304 294 C 342 310 334 348 362 372 C 390 394 384 434 348 446 C 320 456 302 438 314 422 C 322 411 337 415 332 427"
          fill="none" stroke="#E8F2F5" stroke-width="7" stroke-linecap="round" opacity="0.95"/>
    <path d="M 296 302 C 318 326 304 354 322 380 C 338 402 332 428 308 432 C 292 435 284 420 296 412"
          fill="none" stroke="#A9CDF0" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <path d="M 308 290 C 334 298 340 320 328 336"
          fill="none" stroke="#7FAEE8" stroke-width="4" stroke-linecap="round" opacity="0.65"/>
    <path d="M 300 310 C 314 330 302 348 314 366 C 320 376 316 388 306 390"
          fill="none" stroke="#E8F2F5" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M 208 294 C 170 310 178 348 150 372 C 122 394 128 434 164 446 C 192 456 210 438 198 422 C 190 411 175 415 180 427"
          fill="none" stroke="#E8F2F5" stroke-width="7" stroke-linecap="round" opacity="0.95"/>
    <path d="M 216 302 C 194 326 208 354 190 380 C 174 402 180 428 204 432 C 220 435 228 420 216 412"
          fill="none" stroke="#A9CDF0" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <path d="M 204 290 C 178 298 172 320 184 336"
          fill="none" stroke="#7FAEE8" stroke-width="4" stroke-linecap="round" opacity="0.65"/>
    <path d="M 212 310 C 198 330 210 348 198 366 C 192 376 196 388 206 390"
          fill="none" stroke="#E8F2F5" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

    <!-- upper lip bar, tooth row, and big corner fangs -->
    <rect x="208" y="298" width="96" height="10" fill="#BFE0D0"/>
    <path d="M 234 308 L 246 308 L 240 324 Z" fill="#BFE0D0"/>
    <path d="M 250 308 L 262 308 L 256 326 Z" fill="#BFE0D0"/>
    <path d="M 266 308 L 278 308 L 272 324 Z" fill="#BFE0D0"/>
    <path d="M 294 306 Q 304 330 320 342 Q 303 343 292 330 Q 286 318 288 306 Z" fill="#BFE0D0"/>
    <path d="M 218 306 Q 208 330 192 342 Q 209 343 220 330 Q 226 318 224 306 Z" fill="#BFE0D0"/>

    <!-- chin pendant -->
    <rect x="238" y="336" width="36" height="15" fill="#3E8E71"/>

    <!-- ear spools -->
    <circle cx="126" cy="230" r="21" fill="none" stroke="#B8402F" stroke-width="8"/>
    <circle cx="126" cy="230" r="6" fill="#B8402F"/>
    <circle cx="386" cy="230" r="21" fill="none" stroke="#B8402F" stroke-width="8"/>
    <circle cx="386" cy="230" r="6" fill="#B8402F"/>
  </g>
</svg>
